name: Kubernetes FIPS

on:
  schedule:
    # Run at 2:00 UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual triggering
    inputs:
      page:
        description: The page number to fetch
        default: "1"
        type: string
      per_page:
        description: The number of releases per page
        default: "50"
        type: string
      force:
        description: Force the build even if the release already exists
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      kubernetes_minor_version:
        description: The minimum minor version of Kubernetes to build
        type: string

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.get-releases.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get stable K8s releases
        id: get-releases
        run: |
          set -euo pipefail
          MIN_VERSION=${{ github.event.inputs.kubernetes_minor_version }}
          MIN_VERSION=${MIN_VERSION:-33}
          FORCE="${{ github.event.inputs.force }}"
          FORCE=${FORCE:-false}

          # Get stable releases >= 1.MIN_VERSION where version file exists
          MATRIX=$(curl -s "https://api.github.com/repos/kubernetes/kubernetes/releases?page=${{ github.event.inputs.page || 1 }}&per_page=${{ github.event.inputs.per_page || 50 }}" | \
            jq -r '.[] | select(.tag_name | test("^v[0-9]+\\.[0-9]+\\.[0-9]+$")) | .tag_name' | \
            sort -V | \
            awk -F'[.v]' -v min=$MIN_VERSION '$2==1 && $3>=min' | \
            while read version; do
              trimmed=$(echo $version | sed -E 's/\.[0-9]+$//')
              [ -f "./hack/kubernetes-${trimmed}" ] && echo "$version"
            done)

          # Filter out images that already exist (unless force=true)
          FILTERED_MATRIX=""
          for version in $MATRIX; do
            if [ "$FORCE" = "true" ]; then
              FILTERED_MATRIX="$FILTERED_MATRIX$version"$'\n'
            else
              if docker manifest inspect "ghcr.io/loft-sh/kubernetes:${version}-fips-full" > /dev/null 2>&1; then
                echo "Image ghcr.io/loft-sh/kubernetes:${version}-fips-full already exists, skipping"
              else
                FILTERED_MATRIX="$FILTERED_MATRIX$version"$'\n'
              fi
            fi
          done

          # Convert to JSON array for matrix output
          MATRIX_JSON=$(echo "$FILTERED_MATRIX" | jq -R -s -c 'split("\n") | map(select(length > 0)) | {version: .}')

          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

  build-k8s-versions:
    needs: generate-matrix
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: read
      attestations: write
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
      fail-fast: false
    outputs:
      k8s-minor-version: ${{ steps.trim-version.outputs.version }}
      k8s-version: ${{ steps.trim-version.outputs.fullVersion }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build kubernetes FIPS ${{ matrix.version }}
        id: trim-version
        run: |
          VERSION=${{ matrix.version }}
          KUBERNETES_VERSION_TRIMMED=$(echo ${VERSION} | sed -E 's/^(v[0-9]+\.[0-9]+)\.[0-9]+$/\1/')
          
          echo "version=$KUBERNETES_VERSION_TRIMMED" >> $GITHUB_OUTPUT
          echo "fullVersion=$VERSION" >> $GITHUB_OUTPUT
      - name: Build FIPS
        uses: ./.github/actions/fips/tar-archive-release-asset.yaml


      - name: Read build args
        id: build-args
        run: |
          echo "args<<EOF" >> $GITHUB_OUTPUT
          cat ./fips/build-args.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: build-k8s-nodes-image
        needs: build-k8s-versions
        uses: ./.github/actions/build-sub-image/build-and-push-k8s-node-image.yaml
        with:
          k8s-minor-version: ${{ needs.build-k8s-versions.outputs.k8s-minor-version }}
          k8s-version: ${{ needs.build-k8s-versions.outputs.k8s-version }}

      - name: build-helm-image
        needs: build-k8s-versions
        uses: ./.github/actions/build-sub-image/build-and-push-subimage.yaml
        with:
          image_name: ghcr.io/loft-sh/helm-fips
          dockerfile_path: ./fips/base-images/Dockerfile.helm
          k8s-minor-version: ${{ needs.build-k8s-versions.outputs.k8s-minor-version }}
          component_name: HELM_VERSION

      - name: build-etcd-image
        needs: build-k8s-versions
        uses: ./.github/actions/build-sub-image/build-and-push-subimage.yaml
        with:
          image_name: ghcr.io/loft-sh/etcd-fips
          dockerfile_path: ./fips/base-images/Dockerfile.etcd
          k8s-minor-version: ${{ needs.build-k8s-versions.outputs.k8s-minor-version }}
          component_name: ETCD_VERSION

      - name: build-kine-image
        needs: build-k8s-versions
        uses: ./.github/actions/build-sub-image/build-and-push-subimage.yaml
        with:
          image_name: ghcr.io/loft-sh/kine-fips
          dockerfile_path: ./fips/base-images/Dockerfile.kine
          k8s-minor-version: ${{ needs.build-k8s-versions.outputs.k8s-minor-version }}
          component_name: KINE_VERSION

      - name: build-konnectivity-image
        needs: build-k8s-versions
        uses: ./.github/actions/build-sub-image/build-and-push-subimage.yaml
        with:
          image_name: ghcr.io/loft-sh/konnectivity-server-fips
          dockerfile_path: ./fips/base-images/Dockerfile.konnectivity-server
          k8s-minor-version: ${{ needs.build-k8s-versions.outputs.k8s-minor-version }}
          component_name: KONNECTIVITY_VERSION


      # build k8s CP image for shared vCluster (apiserver, controller-manager, and scheduler only
      - name: build-k8s-fips-image
        needs: [build-k8s-nodes-image, build-k8s-versions]
        runs-on: ubuntu-24.04 [Beta]
        steps:
          - name: Checkout
            uses: actions/checkout@v4
          - name: Set up QEMU
            uses: docker/setup-qemu-action@v3
          - name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v3
          - name: Login to ghcr.io
            uses: docker/login-action@v3
            with:
              registry: ghcr.io
              username: ${{ secrets.DOCKER_USERNAME }}
              password: ${{ secrets.GITHUB_TOKEN }}
          - name: Build and push
            id: push
            uses: docker/build-push-action@v6
            with:
              platforms: linux/amd64,linux/arm64
              file: ./fips/Dockerfile
              push: true
              sbom: true
              provenance: true
              tags: ghcr.io/loft-sh/kubernetes-fips:${{ needs.build-k8s-versions.outputs.k8s-version }}
              build-args: |
                KUBERNETES_BASE_IMAGE=${{ needs.build-k8s-nodes-image.outputs.image }}
          - name: Attest
            uses: actions/attest-build-provenance@v2
            id: attest
            with:
              subject-name: ghcr.io/loft-sh/kubernetes-fips
              subject-digest: ${{ steps.push.outputs.digest }}
              push-to-registry: true

      - name: build-amd64-tar-archives
        uses: ./.github/actions/fips/tar-archive-release-asset.yaml
        needs:
          - build-k8s-nodes-image
          - build-k8s-versions
          - build-etcd-image
          - build-etcd-image
          - build-helm-image
          - build-kine-image
          - build-konnectivity-image
        with:
          k8s-version: ${{ matrix.version }}
          arch: amd64

      - name: build-arm64-tar-archives
        uses: ./.github/actions/fips/tar-archive-release-asset.yaml
        needs:
          - build-k8s-nodes-image
          - build-k8s-versions
          - build-etcd-image
          - build-etcd-image
          - build-helm-image
          - build-kine-image
          - build-konnectivity-image
        with:
          k8s-version: ${{ matrix.version }}
          arch: arm64
          kubernetes-fips-image: ${{ needs.build-k8s-nodes-image.outputs.image }}
          etcd-fips-image: ${{ needs.build-etcd-image.outputs.image }}
          helm-fips-image: ${{ needs.build-helm-image.outputs.image }}
          kine-fips-image: ${{ needs.build-kine-image.outputs.image }}
          konnectivity-fips-image: ${{ needs.build-konnectivity-image.outputs.image }}
          pause-image-version: "3.10"

      - name: build-k8s-fips-full-image
        needs:
        - build-amd64-tar-archives
        - build-arm64-tar-archives

